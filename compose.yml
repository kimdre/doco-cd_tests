services:
  app:
    image: alpine:3.20
    restart: "unless-stopped"
    command: ["sh", "-c", "touch /tmp/healthy; trap : TERM INT; while true; do sleep 1; done"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/unhealthy"]
      interval: 1s
      timeout: 1s
      retries: 1
      start_period: 1s
