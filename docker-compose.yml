services:
  dummy:
    image: bash:latest
    scale: 0

  test:
    image: bash:latest
    #scale: 0
    restart: no
#    deploy:
#      #mode: global
#      restart_policy:
#        condition: none
    entrypoint: ["sh", "-ec"]
    environment:
      TZ: Europe/Berlin
      ID: 3
    command:
      - |
        echo "Hello world!"
        date
        sleep 15
    labels:
      cd.doco.job.enabled: "true"
      cd.doco.job.schedule: "@every 30s"
      #cd.doco.job.skip_running: "false"
      cd.doco.job.execution_mode: restart #one_off
      cd.doco.job.run_on_deploy: "true"
      cd.doco.job.wait_running_jobs: "true"

  nginx:
    image: nginx:latest