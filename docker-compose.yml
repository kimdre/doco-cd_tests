services:
  frontend-init:
    image: nginx
    restart: "no"
    user: "0"
    volumes:
      - frontend_static:/static
    entrypoint: ["/bin/sh", "-c"]
    command: ["touch /tmp/foo && cp -a /tmp/* /static/ && rm -rf /static/foo"]
 
  nginx:
    image: nginx
    restart: unless-stopped
    volumes:
      - frontend_static:/usr/share/nginx/html:ro
    ports:
      - "443:443"
    depends_on:
      frontend-init:
        condition: service_completed_successfully
 
volumes:
  frontend_static: