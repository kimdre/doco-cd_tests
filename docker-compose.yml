services:
  dummy:
    image: bash:latest
    scale: 0

  test:
    image: bash:latest
    scale: 0
    restart: no
#    deploy:
#      #mode: global
#      restart_policy:
#        condition: none
    entrypoint: ["sh", "-ec"]
    environment:
      TZ: Europe/Berlin
    command:
      - |
        echo "Hello world!"
        date
    labels:
      cd.doco.job.enabled: "true"
      cd.doco.job.schedule: "@every 10s"
      #cd.doco.job.skip_running: "false"
      cd.doco.job.execution_mode: "one_shot"
