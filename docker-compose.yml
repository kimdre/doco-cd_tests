include:
- include.compose.yml

services:
  test:
    #scale: 1
    #container_name: test 
    extends:
      file: base.compose.yml
      service: base
    image: nginx:latest # 1.29.3
    restart: unless-stopped
    environment:
      TZ: Europe/Berlin
      SOME: Value
      id: 8
    labels:
      - traefik.enable=true
      - traefik.http.routers.webhook.entrypoints=websecure
      - traefik.http.routers.webhook.tls.certresolver=le
      - test=$HOST_HOSTNAME
    ports:
      - "80"
    volumes:
      - ./html:/usr/share/nginx/html
      - test:/test
    configs:
      - test.txt
    secrets:
      - secret.txt
    env_file:
      - .env
      - test.enc.env
    networks:
      test:
    healthcheck:
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
      test: "curl 127.0.0.1:80"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  test:

networks:
  test:

configs:
  test.txt:
    file: test.txt

secrets:
  secret.txt:
    file: secret.txt
