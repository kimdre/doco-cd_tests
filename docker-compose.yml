services:
  frontend-init:
    image: nginx
    container_name: frontend-init
    restart: "no"
    user: "0"
    volumes:
      - frontend_static:/static
    entrypoint: ["/bin/sh", "-c"]
    command: ["echo test && cp -a /tmp/. /tmp-new/"]
 
  nginx:
    image: nginx
    container_name: nginx
    restart: unless-stopped
    volumes:
      - frontend_static:/usr/share/nginx/html:ro
    ports:
      - "443:443"
    depends_on:
      frontend-init:
        condition: service_completed_successfully
 
volumes:
  frontend_static: