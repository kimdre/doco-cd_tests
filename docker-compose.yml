services:
  test:
    image: bash:latest
    restart: no
    entrypoint: ["sh", "-ec"]
    environment:
      TZ: Europe/Berlin
    command:
      - |
        echo "Hello world!"
        date
        sleep 15
        echo "Goodbye world!"
    labels:
      cd.doco.job.enabled: "true"
      cd.doco.job.schedule: "@every 10s"
      cd.doco.job.skip_running: "false"
