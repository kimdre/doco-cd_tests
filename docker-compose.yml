services:
  init_example:
    container_name: init_example
    image: alpine:3.23.4
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        apk add --no-cache gettext
        envsubst < /temp/example.ini > /tmp/example.ini
        cp -f /tmp/example.ini /app1/example.ini
        envsubst < /temp/example.toml > /tmp/example.toml
        cp -f /tmp/example.toml /app2/example.toml
        exit 0
    environment:
      TEST: hello
    restart: "no"
    volumes:
      - ./temp/:/temp
      - ./app1/:/app1
      - ./app2/:/app2

  example:
    image: nginx
    depends_on:
      init_example:
        condition: service_completed_successfully
