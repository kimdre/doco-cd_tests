services:
  test:
    image: bash:latest
    restart: no
    entrypoint: ["sh", "-ec"]
    environment:
      TZ: Europe/Berlin
    volumes:
      - /tmp/test/:/tmp/test/
    command:
      - |
        echo "Hello world!" >> /tmp/test/test.txt
        date >> /tmp/test/test.txt
    labels:
      cd.doco.job.enabled: "true"
      cd.doco.job.schedule: "@every 10s"
      cd.doco.job.skip_running: "false"
      cd.doco.job.execution_mode: "one_shot"
